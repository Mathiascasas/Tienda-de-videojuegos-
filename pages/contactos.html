<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamestore - Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

    <header id="encabezado">
        <h1>Gamestore</h1>
    </header>

    <nav class="menu">
        <a href="/index.html">Inicio</a> 
        <a href="/pages/juegos.html">Juegos</a>
        <a href="/pages/consolas.html">Consolas</a>
        <a href="/pages/ofertas.html">Ofertas</a>
        <a href="/pages/contactos.html" class="activo">Contacto</a>
    </nav>

<main>

    <section class="contacto">

        <h2>Contáctanos</h2>

        <p>
            ¿Tienes alguna pregunta? Nuestro equipo está listo para ayudarte.
        </p>


        <div class="catalogo-grid">

            <div class="producto-card">

                <div class="producto-icono">
                    <i class="fa-solid fa-envelope"></i>
                </div>

                <h3>Correo</h3>

                <p class="producto-desc">
                    Gamestore@gmail.com
                </p>

            </div>


            <div class="producto-card">

                <div class="producto-icono">
                    <i class="fa-solid fa-phone"></i>
                </div>

                <h3>Teléfono</h3>

                <p class="producto-desc">
                    9999991
                </p>

            </div>


            <div class="producto-card">

                <div class="producto-icono">
                    <i class="fa-solid fa-location-dot"></i>
                </div>

                <h3>Ubicación</h3>

                <p class="producto-desc">
                    Lima, Perú
                </p>

            </div>

        <div class="producto-card horario-contacto">

                <div class="producto-icono">
                    <i class="fa-solid fa-clock"></i>
                </div>

                <h3>Horario</h3>

                <p class="producto-desc">
                    Lunes a sábado: 9:00 AM - 8:00 PM
                </p>

                </div>
    </div>


        <button class="btn-catalogo mt-4">
            Enviar mensaje
        </button>


    </section>

</main>

    <footer>
        <p>© 2026 Gamestore - Todos los derechos reservados.</p>
    </footer>
</body>
</html>
